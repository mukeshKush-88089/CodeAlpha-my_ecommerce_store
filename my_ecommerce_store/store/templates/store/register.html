{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Mera Shop</title>
    <link rel="stylesheet" href="{% static 'store/css/style.css' %}">
</head>
<body>
    <div class="auth-container">
        <h2>📝 Create Account</h2>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }} <button type="submit" class="btn">Register</button>
        </form>
        <a href="{% url 'login' %}" class="auth-links">Already have an account? Login here</a>
    </div>
</body>
</html>
